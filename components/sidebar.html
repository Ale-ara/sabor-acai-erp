<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard ERP</title>

    <link rel="stylesheet" href="../css/dashboard.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div>

            <!-- TOPO SIDEBAR -->

            <div class="sidebar-top">

                <img 
                    src="../assets/logo.png"
                    alt="Logo"
                    class="logo"
                >

                <div>

                    <h2>Sabor ERP</h2>

                    <span>
                        Sabor do Açaí
                    </span>

                </div>

            </div>

            <!-- MENU -->

            <nav class="menu">

                <a href="dashboard.html" class="active">
                    📊 Dashboard
                </a>

                <a href="caixa.html">
                    💰 Caixa
                </a>

                <a href="produtos.html">
                    🍧 Produtos
                </a>

                <a href="estoque.html">
                    📦 Estoque
                </a>

                <a href="vendas.html">
                    🧾 Vendas
                </a>

                <a href="relatorios.html">
                    📈 Relatórios
                </a>

                <a href="#">
                    ⚙️ Configurações
                </a>

            </nav>

        </div>

        <!-- BOTÃO SAIR -->

        <button class="logout-btn" onclick="logout()">
            Sair
        </button>

    </aside>

    <!-- CONTEÚDO -->

    <main class="main-content">

        <!-- TOPBAR -->

        <header class="topbar">

            <div>

                <h1>Dashboard</h1>

                <p>
                    Bem-vindo ao sistema Sabor do Açaí
                </p>

            </div>

            <!-- USUÁRIO -->

            <div class="top-user">

                <div class="notification">
                    🔔
                </div>

                <div class="user-info">

                    <div>

                        <strong>
                            Administrador
                        </strong>

                        <span>
                            Caixa Principal
                        </span>

                    </div>

                    <img 
                        src="https://i.pravatar.cc/100"
                        alt="Usuário"
                    >

                </div>

            </div>

        </header>

        <!-- CARDS -->

        <section class="cards">

            <div class="card">

                <h3>Vendas Hoje</h3>

                <strong>
                    R$ 0,00
                </strong>

            </div>

            <div class="card">

                <h3>Pedidos</h3>

                <strong>
                    0
                </strong>

            </div>

            <div class="card">

                <h3>Total Produtos</h3>

                <strong id="total-produtos">
                    0
                </strong>

            </div>

            <div class="card">

                <h3>Estoque Total</h3>

                <strong id="estoque-total">
                    0
                </strong>

            </div>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="../js/supabase.js"></script>

    <script>

        async function checkAuth(){

            const { data } =
            await supabaseClient.auth.getUser()

            if(!data.user){

                window.location.href = '../index.html'
            }

        }

        checkAuth()

        async function logout(){

            await supabaseClient.auth.signOut()

            window.location.href = '../index.html'
        }

        async function carregarDashboard(){

            const { data } =
            await supabaseClient
            .from('produtos')
            .select('*')

            document.getElementById(
                'total-produtos'
            ).innerText = data.length

            let estoqueTotal = 0

            data.forEach(produto => {

                estoqueTotal += produto.estoque

            })

            document.getElementById(
                'estoque-total'
            ).innerText = estoqueTotal
        }

        carregarDashboard()

    </script>

</body>
</html>
