<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Usuário | ERP Sabor do Açaí
    </title>

    <link
    rel="icon"
    type="image/png"
    href="../assets/logo.png"
>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="../css/global.css"
    >

    <link
        rel="stylesheet"
        href="../css/usuarios.css"
    >

    <!-- FONTS -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <button
        class="menu-mobile-btn"
        onclick="toggleSidebar()"
    >
        ☰
    </button>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div>

            <!-- LOGO -->

            <div class="logo-area">

                <img
                    src="../assets/logo.png"
                    alt="Logo"
                >

                <div>

                    <h2>
                        Sabor ERP
                    </h2>

                    <p>
                        Sabor do Açaí
                    </p>

                </div>

            </div>

            <!-- MENU -->

            <nav class="menu">

    <a href="dashboard.html">
        📊 Dashboard
    </a>

    <a href="caixa.html">
        💰 Caixa
    </a>

    <a href="produtos.html">
        🍧 Produtos
    </a>

    <a href="estoque.html">
        📦 Estoque
    </a>

    <a href="movimentacoes.html">
        🔄 Movimentações
    </a>

    <a href="vendas.html">
        🧾 Vendas
    </a>

    <a href="relatorios.html">
        📈 Relatórios
    </a>

    <a href="usuarios.html">
        👤 Usuário
    </a>

</nav>

        </div>

        <!-- FOOTER -->

        <div class="sidebar-footer">

           

            <button
                class="logout-btn"
                onclick="logout()"
            >
                Sair
            </button>

        </div>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <!-- HEADER -->

        <header class="top-header">

            <div>

                <h1>
                    Meu Perfil
                </h1>

                <p>
                    Gerencie suas informações
                </p>

            </div>

            <!-- USER -->

            <div class="user-box">

                <img
                    id="top-user-avatar"
                    src="https://i.imgur.com/6VBx3io.png"
                    alt="Usuário"
                >

                <div>

                    <strong id="user-name">
                        Usuário
                    </strong>

                    <span id="user-cargo">
                        Cargo
                    </span>

                </div>

            </div>

        </header>

        <!-- GRID -->

        <section class="usuario-grid">

            <!-- FOTO -->

            <div class="usuario-card foto-card">

                <h2>
                    Foto de Perfil
                </h2>

                <div class="avatar-area">

                   <img
    id="preview-avatar"
    src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
    alt="Avatar"
>

                    <label
                        for="avatar-input"
                        class="avatar-btn"
                    >
                        Alterar Foto
                    </label>

                    <input
                        type="file"
                        id="avatar-input"
                        accept="image/*"
                    >

                </div>

            </div>

            <!-- DADOS -->

            <div class="usuario-card">

                <h2>
                    Informações
                </h2>

                <div class="input-group">

                    <label>
                        Nome
                    </label>

                    <input
                        type="text"
                        id="nome"
                    >

                </div>

                <div class="input-group">

                    <label>
                        Usuário
                    </label>

                    <input
                        type="text"
                        id="usuario"
                    >

                </div>

                <div class="input-group">

                    <label>
                        E-mail
                    </label>

                    <input
                        type="email"
                        id="email"
                    >

                </div>

                <button
                    class="save-btn"
                    onclick="salvarPerfil()"
                >
                    Salvar Alterações
                </button>

            </div>

            <!-- SENHA -->

            <div class="usuario-card">

                <h2>
                    Alterar Senha
                </h2>

                <div class="input-group">

                    <label>
                        Nova senha
                    </label>

                    <input
                        type="password"
                        id="nova-senha"
                    >

                </div>

                <div class="input-group">

                    <label>
                        Confirmar senha
                    </label>

                    <input
                        type="password"
                        id="confirmar-senha"
                    >

                </div>

                <button
                    class="save-btn"
                    onclick="alterarSenha()"
                >
                    Atualizar Senha
                </button>

            </div>

        </section>

    </main>

    <!-- TOAST -->

    <div id="toast-container">

    </div>

    <!-- JS -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="../js/supabase.js"></script>

    <script src="../js/global.js"></script>

    <script src="../js/usuarios.js"></script>

</body>

</html>
