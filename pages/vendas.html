<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Vendas | ERP Sabor do Açaí
    </title>

    <link
        rel="icon"
        type="image/png"
        href="../assets/logo.png"
    >

    <!-- GLOBAL -->

    <link rel="stylesheet" href="../css/global.css">

    <!-- PÁGINA -->

    <link rel="stylesheet" href="../css/vendas.css">

    <!-- FONT -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ESTILO BOTÃO CANCELAR -->

    <style>

        .acoes-venda{

            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .cancelar-btn{

            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: .2s;
        }

        .cancelar-btn:hover{

            background: #b91c1c;
            transform: scale(1.03);
        }

        .status-cancelada{

            background: #fee2e2;
            color: #dc2626;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-ativa{

            background: #dcfce7;
            color: #16a34a;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }

    </style>

</head>

<body>

    <!-- PAGE TRANSITION -->

    <div class="page-transition" id="page-transition"></div>

    <!-- NAVBAR MOBILE -->

    <header class="mobile-navbar">

        <div class="mobile-left">

            <img
                src="../assets/logo.png"
                alt="Logo"
            >

            <h2>
                Sabor ERP
            </h2>

        </div>

        <button
            class="menu-mobile-btn"
            onclick="toggleSidebar()"
        >
            ☰
        </button>

    </header>

    <!-- OVERLAY -->

    <div
        class="sidebar-overlay"
        id="sidebar-overlay"
        onclick="fecharSidebar()"
    ></div>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div>

            <!-- TOPO -->

            <div class="sidebar-top">

                <img 
                    src="../assets/logo.png"
                    alt="Logo"
                    class="logo"
                >

                <div>

                    <h2>
                        Sabor ERP
                    </h2>

                    <span>
                        Sabor do Açaí
                    </span>

                </div>

            </div>

            <!-- MENU -->

            <nav class="menu">

                <a href="dashboard.html">
                    📊 Dashboard
                </a>

                <a href="caixa.html">
                    💰 Caixa
                </a>

                <a href="produtos.html">
                    🍧 Produtos
                </a>

                <a href="estoque.html">
                    📦 Estoque
                </a>

                <a href="movimentacoes.html">
                    🔄 Movimentações
                </a>

                <a href="vendas.html">
                    🧾 Vendas
                </a>

                <a href="relatorios.html">
                    📈 Relatórios
                </a>

                <a href="usuarios.html">
                    👤 Usuário
                </a>

            </nav>

        </div>

        <!-- SAIR -->

        <button 
            class="logout-btn"
            onclick="logout()"
        >
            Sair
        </button>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <!-- HEADER -->

        <header class="top-header">

            <div class="header-left">

                <h1>
                    Vendas
                </h1>

                <p>
                    Histórico completo de vendas
                </p>

            </div>

        </header>

        <!-- TABELA -->

        <section class="tabela-box">

            <table>

                <thead>

                    <tr>

                        <th>
                            Venda
                        </th>

                        <th>
                            Data
                        </th>

                        <th>
                            Total
                        </th>

                        <th>
                            Status
                        </th>

                        <th>
                            Ações
                        </th>

                    </tr>

                </thead>

                <tbody id="tabela-vendas">

                </tbody>

            </table>

        </section>

    </main>

    <!-- MODAL ITENS -->

    <div 
        class="modal-venda"
        id="modal-venda"
    >

        <div class="modal-box">

            <div class="modal-topo">

                <h2>
                    Itens da Venda
                </h2>

                <button onclick="fecharModal()">
                    ✕
                </button>

            </div>

            <div id="itens-venda">

            </div>

        </div>

    </div>

    <!-- MODAL IMPRESSÃO -->

    <div
        class="modal-venda"
        id="popup-impressao"
    >

        <div class="modal-box">

            <div class="modal-topo">

                <h2>
                    Escolha a impressão
                </h2>

                <button
                    onclick="fecharPopupImpressao()"
                >
                    ✕
                </button>

            </div>

            <div
                style="
                    display:flex;
                    flex-direction:column;
                    gap:14px;
                    margin-top:20px;
                "
            >

                <button
                    class="ver-btn"
                    onclick="imprimirA4()"
                >
                    🖨️ Impressão A4
                </button>

                <button
                    class="ver-btn"
                    onclick="imprimirTermica()"
                >
                    🧾 Impressão Térmica
                </button>

            </div>

        </div>

    </div>

    <!-- SCRIPTS -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="../js/supabase.js"></script>

    <script src="../js/auth.js"></script>

    <script src="../js/global.js"></script>

    <script src="../js/vendas.js"></script>

</body>
</html>
